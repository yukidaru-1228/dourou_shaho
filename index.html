<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>道路運送車両法 学習アプリ</title>
<style>
  :root{
    --paper:#ecefe9;
    --card:#ffffff;
    --ink:#14231d;
    --ink-soft:#4a5a52;
    --ink-faint:#8a988f;
    --line:#d5dbd3;
    --line-soft:#e6eae4;
    --plate:#0a6b4a;
    --plate-dark:#08553b;
    --plate-tint:#e2f0e8;
    --correct:#1f7a4d;
    --correct-bg:#e2f3e9;
    --wrong:#b23a26;
    --wrong-bg:#f9e7e2;
    --gold:#b8912f;
    --serif:"Hiragino Mincho ProN","Yu Mincho",YuMincho,"Noto Serif JP","MS Mincho",serif;
    --sans:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px 48px;}

  /* header plate */
  header{padding:18px 16px 8px;max-width:560px;margin:0 auto;}
  .plate{
    background:var(--card);
    border:2.5px solid var(--plate);
    border-radius:12px;
    padding:11px 16px;
    display:flex;align-items:center;gap:12px;
    box-shadow:0 1px 0 var(--line);
  }
  .plate .region{
    font-family:var(--serif);
    color:var(--plate);
    font-weight:700;
    font-size:13px;
    letter-spacing:.14em;
    writing-mode:horizontal-tb;
    border-right:1.5px solid var(--line);
    padding-right:12px;
    white-space:nowrap;
  }
  .plate .title{flex:1;min-width:0;}
  .plate .title b{
    font-family:var(--serif);
    font-size:19px;font-weight:700;color:var(--ink);letter-spacing:.02em;
    display:block;line-height:1.25;
  }
  .plate .title span{font-size:11px;color:var(--ink-faint);letter-spacing:.06em;}

  h2.eyebrow{
    font-size:11px;letter-spacing:.22em;color:var(--plate);
    font-weight:700;margin:26px 0 10px;text-transform:none;
  }
  .eyebrow::before{content:"— ";}

  /* overall progress */
  .overview{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 16px 14px;margin-top:14px;
  }
  .overview .row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;}
  .overview .big{font-family:var(--serif);font-size:30px;font-weight:700;color:var(--plate);line-height:1;}
  .overview .big small{font-size:14px;color:var(--ink-faint);font-family:var(--sans);font-weight:400;margin-left:4px;}
  .overview .lbl{font-size:12px;color:var(--ink-soft);}
  .bar{height:9px;background:var(--line-soft);border-radius:99px;overflow:hidden;}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--plate),#12a06e);border-radius:99px;transition:width .5s cubic-bezier(.2,.7,.2,1);}
  .mini-stats{display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--ink-soft);}
  .mini-stats b{color:var(--ink);font-weight:700;font-size:14px;}

  /* mode buttons */
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
  .mode-btn{
    border:1px solid var(--line);background:var(--card);border-radius:13px;
    padding:14px 14px;text-align:left;cursor:pointer;font-family:var(--sans);
    transition:transform .12s ease,box-shadow .12s ease,border-color .12s;
    color:var(--ink);
  }
  .mode-btn:active{transform:scale(.98);}
  .mode-btn:hover{border-color:var(--plate);box-shadow:0 3px 14px rgba(10,107,74,.09);}
  .mode-btn .m-t{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px;}
  .mode-btn .m-d{font-size:11.5px;color:var(--ink-faint);margin-top:3px;line-height:1.5;}
  .mode-btn.wide{grid-column:1 / -1;}
  .mode-btn.primary{background:var(--plate);border-color:var(--plate);color:#fff;}
  .mode-btn.primary .m-d{color:#c9e7da;}
  .mode-btn.review .m-t .n{margin-left:auto;background:var(--wrong);color:#fff;font-size:11px;padding:1px 8px;border-radius:99px;font-weight:700;}
  .mode-btn:disabled{opacity:.45;cursor:default;}
  .mode-btn:disabled:hover{border-color:var(--line);box-shadow:none;}
  .ico{width:18px;height:18px;flex:none;}

  /* category list */
  .cat{
    background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:13px 15px;margin-bottom:9px;cursor:pointer;display:block;width:100%;
    text-align:left;font-family:var(--sans);color:var(--ink);
    transition:border-color .12s,box-shadow .12s;
  }
  .cat:hover{border-color:var(--plate);box-shadow:0 3px 14px rgba(10,107,74,.08);}
  .cat:active{transform:scale(.995);}
  .cat .c-head{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .sticker{
    font-family:var(--serif);font-size:13px;font-weight:700;color:#fff;
    background:var(--plate);border-radius:6px;min-width:30px;height:30px;
    display:flex;align-items:center;justify-content:center;flex:none;letter-spacing:0;
  }
  .cat .c-name{font-weight:700;font-size:15px;flex:1;line-height:1.3;}
  .cat .c-art{font-size:10.5px;color:var(--ink-faint);letter-spacing:.03em;margin-top:1px;font-weight:400;}
  .cat .c-pct{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--plate);}
  .cat .c-pct.zero{color:var(--ink-faint);}

  /* quiz */
  .q-top{display:flex;align-items:center;gap:12px;padding:16px 0 4px;}
  .backbtn{border:1px solid var(--line);background:var(--card);border-radius:10px;
    width:38px;height:38px;flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}
  .backbtn:active{transform:scale(.94);}
  .q-prog{flex:1;}
  .q-prog .bar{height:7px;}
  .q-prog .cnt{font-size:11.5px;color:var(--ink-faint);margin-bottom:5px;display:flex;justify-content:space-between;}
  .q-prog .cnt b{color:var(--ink);font-weight:700;}

  .qcard{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px 18px;margin-top:16px;
    box-shadow:0 6px 24px rgba(20,35,29,.05);
  }
  .qtag{display:inline-flex;gap:7px;align-items:center;font-size:10.5px;letter-spacing:.05em;
    color:var(--plate);font-weight:700;margin-bottom:13px;}
  .qtag .type{background:var(--plate-tint);padding:2px 9px;border-radius:99px;}
  .qtag .art{color:var(--ink-faint);font-weight:400;}
  .qtext{font-family:var(--serif);font-size:19px;line-height:1.6;font-weight:700;color:var(--ink);letter-spacing:.01em;}
  .qtext .blank{color:var(--plate);border-bottom:2px dashed var(--plate);padding:0 14px;}

  .choices{margin-top:18px;display:flex;flex-direction:column;gap:9px;}
  .choice{
    border:1.5px solid var(--line);background:var(--card);border-radius:12px;
    padding:13px 14px 13px 46px;position:relative;cursor:pointer;text-align:left;
    font-family:var(--sans);font-size:14.5px;color:var(--ink);line-height:1.5;width:100%;
    transition:border-color .12s,background .12s;
  }
  .choice:hover:not(:disabled){border-color:var(--plate);}
  .choice:active:not(:disabled){transform:scale(.99);}
  .choice .key{
    position:absolute;left:12px;top:50%;transform:translateY(-50%);
    width:24px;height:24px;border-radius:7px;border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
    color:var(--ink-soft);background:var(--paper);
  }
  .choice.correct{border-color:var(--correct);background:var(--correct-bg);}
  .choice.correct .key{background:var(--correct);border-color:var(--correct);color:#fff;}
  .choice.wrong{border-color:var(--wrong);background:var(--wrong-bg);}
  .choice.wrong .key{background:var(--wrong);border-color:var(--wrong);color:#fff;}
  .choice:disabled{cursor:default;}
  .choice.dim{opacity:.55;}

  /* flashcard */
  .flip{margin-top:18px;}
  .card-face{
    background:var(--card);border-radius:14px;padding:22px 18px;min-height:120px;
    display:flex;align-items:center;justify-content:center;text-align:center;
  }
  .card-face.front{border:1.5px solid var(--line);}
  .card-face.back{border:1.5px solid var(--plate);background:var(--plate-tint);text-align:left;align-items:flex-start;}
  .card-face.front .fc{font-family:var(--serif);font-size:18px;font-weight:700;line-height:1.6;}
  .card-face.back .bc{font-size:14.5px;line-height:1.85;color:var(--ink);}
  .card-face.back .bc .em{color:var(--plate-dark);font-weight:700;}

  .reveal-btn{
    margin-top:14px;width:100%;border:none;background:var(--plate);color:#fff;
    border-radius:12px;padding:14px;font-size:15px;font-weight:700;font-family:var(--sans);cursor:pointer;
  }
  .reveal-btn:active{transform:scale(.99);}
  .self{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px;}
  .self button{
    border-radius:12px;padding:14px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:var(--sans);
    border:1.5px solid;
  }
  .self .again{border-color:var(--wrong);color:var(--wrong);background:var(--wrong-bg);}
  .self .know{border-color:var(--correct);color:#fff;background:var(--correct);}
  .self button:active{transform:scale(.98);}

  /* explanation */
  .expl{margin-top:15px;border-radius:13px;padding:14px 15px;font-size:13.5px;line-height:1.75;
    border:1px solid;animation:fade .3s ease;}
  .expl.ok{background:var(--correct-bg);border-color:#bfe3cd;}
  .expl.ng{background:var(--wrong-bg);border-color:#eecabf;}
  .expl .verdict{font-weight:700;font-size:14px;margin-bottom:5px;display:flex;align-items:center;gap:6px;}
  .expl.ok .verdict{color:var(--correct);}
  .expl.ng .verdict{color:var(--wrong);}
  .expl .body{color:var(--ink);}
  .expl .body .k{font-weight:700;color:var(--plate-dark);}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .next-btn{
    margin-top:14px;width:100%;border:none;background:var(--ink);color:#fff;
    border-radius:12px;padding:15px;font-size:15px;font-weight:700;font-family:var(--sans);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .next-btn:active{transform:scale(.99);}

  /* result */
  .result{text-align:center;padding-top:26px;}
  .result .ring{margin:10px auto 4px;}
  .result h3{font-family:var(--serif);font-size:22px;margin:6px 0 2px;font-weight:700;}
  .result .sub{font-size:13px;color:var(--ink-soft);margin-bottom:20px;}
  .result .rbig{font-family:var(--serif);font-size:15px;fill:var(--plate);font-weight:700;}
  .result .rsmall{font-size:9px;fill:var(--ink-faint);}
  .rgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .rgrid .box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .rgrid .box .n{font-family:var(--serif);font-size:26px;font-weight:700;line-height:1;}
  .rgrid .box.ok .n{color:var(--correct);}
  .rgrid .box.ng .n{color:var(--wrong);}
  .rgrid .box .t{font-size:11px;color:var(--ink-faint);margin-top:5px;}

  footer{text-align:center;font-size:10.5px;color:var(--ink-faint);padding:22px 16px 8px;line-height:1.7;}
  .hidden{display:none!important;}

  /* fill-in-the-blank */
  .fill-input{margin-top:16px;width:100%;border:1.5px solid var(--line);border-radius:12px;
    padding:13px 14px;font-size:16px;font-family:var(--sans);color:var(--ink);background:var(--paper);}
  .fill-input:focus{outline:none;border-color:var(--plate);background:#fff;}
  .fill-input:disabled{opacity:.75;}
  .fill-actions{display:grid;grid-template-columns:1fr auto;gap:9px;margin-top:12px;align-items:stretch;}
  .fill-actions .reveal-btn{margin-top:0;}
  .fill-skip{border:1px solid var(--line);background:var(--card);color:var(--ink-faint);
    border-radius:12px;padding:0 18px;font-size:13px;font-family:var(--sans);cursor:pointer;white-space:nowrap;}
  .fill-skip:active{transform:scale(.98);}

  /* true / false (marubatsu) */
  .tf{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:18px;}
  .tf-btn{border:1.5px solid var(--line);background:var(--card);border-radius:14px;padding:20px 12px;
    font-size:15px;font-weight:700;font-family:var(--sans);color:var(--ink);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:7px;transition:border-color .12s,background .12s;}
  .tf-btn:hover:not(:disabled){border-color:var(--plate);}
  .tf-btn:active:not(:disabled){transform:scale(.98);}
  .tf-btn .tf-mark{font-size:30px;line-height:1;font-family:var(--serif);}
  .tf-btn[data-v="t"] .tf-mark{color:var(--correct);}
  .tf-btn[data-v="f"] .tf-mark{color:var(--wrong);}
  .tf-btn.correct{border-color:var(--correct);background:var(--correct-bg);}
  .tf-btn.wrong{border-color:var(--wrong);background:var(--wrong-bg);}
  .tf-btn:disabled{cursor:default;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none!important;animation:none!important;}
  }
</style>
</head>
<body>
<header>
  <div class="plate">
    <div class="region">車両法</div>
    <div class="title">
      <b>道路運送車両法</b>
      <span>試験対策 学習アプリ ・ 全<span id="qtotal">0</span>問</span>
    </div>
  </div>
</header>

<div class="wrap">
  <!-- HOME -->
  <section id="home">
    <div class="overview">
      <div class="row">
        <div><div class="big"><span id="ovPct">0</span><small>% 習得</small></div></div>
        <div class="lbl" style="text-align:right"><span id="ovMastered">0</span> / <span id="ovAll">0</span> 問クリア<br><span id="ovSeen">0</span> 問 学習済み</div>
      </div>
      <div class="bar"><i id="ovBar" style="width:0%"></i></div>
      <div class="mini-stats">
        <div>正答率 <b id="ovAcc">–</b></div>
        <div>要復習 <b id="ovReview">0</b> 問</div>
      </div>
    </div>

    <h2 class="eyebrow">学習メニュー</h2>
    <div class="modes">
      <button class="mode-btn primary wide" id="btnAll">
        <div class="m-t">全範囲チャレンジ</div>
        <div class="m-d">全問題をランダム出題。まずはここから力試し。</div>
      </button>
      <button class="mode-btn review wide" id="btnReview" disabled>
        <div class="m-t">苦手だけ復習 <span class="n" id="reviewN">0</span></div>
        <div class="m-d">間違えた・あやふやな問題だけを集中的に。</div>
      </button>
    </div>

    <h2 class="eyebrow">分野別に学ぶ</h2>
    <div id="catList"></div>

    <button class="mode-btn wide" id="btnReset" style="margin-top:14px;border-style:dashed;color:var(--ink-faint);text-align:center;">
      <div class="m-t" style="justify-content:center;font-size:13px;font-weight:400;">進捗をリセット</div>
    </button>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hidden">
    <div class="q-top">
      <button class="backbtn" id="quizBack" aria-label="戻る">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="q-prog">
        <div class="cnt"><span id="qmode">分野学習</span><span><b id="qidx">1</b> / <span id="qlen">10</span></span></div>
        <div class="bar"><i id="qbar" style="width:0%"></i></div>
      </div>
    </div>
    <div id="qbody"></div>
  </section>

  <!-- RESULT -->
  <section id="result" class="hidden">
    <div class="result">
      <svg class="ring" width="128" height="128" viewBox="0 0 128 128">
        <circle cx="64" cy="64" r="54" fill="none" stroke="var(--line-soft)" stroke-width="12"/>
        <circle id="ringFill" cx="64" cy="64" r="54" fill="none" stroke="var(--plate)" stroke-width="12"
          stroke-linecap="round" stroke-dasharray="339.29" stroke-dashoffset="339.29"
          transform="rotate(-90 64 64)" style="transition:stroke-dashoffset .8s cubic-bezier(.2,.7,.2,1)"/>
        <text id="ringPct" class="rbig" x="64" y="62" text-anchor="middle">0%</text>
        <text class="rsmall" x="64" y="78" text-anchor="middle">正答率</text>
      </svg>
      <h3 id="resTitle">おつかれさま</h3>
      <div class="sub" id="resSub"></div>
      <div class="rgrid">
        <div class="box ok"><div class="n" id="resOk">0</div><div class="t">正解</div></div>
        <div class="box ng"><div class="n" id="resNg">0</div><div class="t">要復習</div></div>
      </div>
      <button class="mode-btn primary wide" id="resReview" style="margin-bottom:10px;">
        <div class="m-t" style="justify-content:center;">間違えた問題をもう一度</div>
      </button>
      <button class="mode-btn wide" id="resHome">
        <div class="m-t" style="justify-content:center;">ホームに戻る</div>
      </button>
    </div>
  </section>

  <footer>
    条文の内容は e-Gov・国土交通省資料等をもとに要点を整理したものです。<br>
    最終確認は必ず最新の条文（e-Gov法令検索）で行ってください。
  </footer>
</div>

<script>
/* ============================================================
   問題データ  cat=分野, art=条文, type=mc(4択) / card(暗記カード)
   ============================================================ */
const CATS = [
  {key:"sokusoku", label:"総則（目的・定義）", art:"第1条・第2条", tag:"総則"},
  {key:"shubetsu", label:"自動車の種別と数値", art:"第3条・施行規則別表第一", tag:"種別"},
  {key:"touroku",  label:"登録", art:"第4条・第7条・第11条", tag:"登録"},
  {key:"rinji",    label:"臨時運行", art:"第34条・第35条", tag:"臨時"},
  {key:"tenken",   label:"点検・整備", art:"第47〜50条", tag:"点検"},
  {key:"kensa",    label:"検査（車検）", art:"第59〜71条", tag:"検査"},
  {key:"seibi",    label:"整備事業・指定整備", art:"第92条・第94条の4〜6", tag:"整備"},
  {key:"meirei",   label:"各種命令（整備命令・改善命令）", art:"第54条・第54条の2・第92条", tag:"命令"},
];

const Q = [
  // ---------- 総則 ----------
  {id:"s1",cat:"sokusoku",art:"第1条",type:"mc",
   q:"道路運送車両法 第1条が掲げる「目的」に含まれないものはどれか。",
   choices:["所有権についての公証等を行うこと","安全性の確保・環境の保全・整備技術の向上","自動車の整備事業の健全な発達に資すること","運転免許制度を整備すること"],ans:3,
   exp:"第1条の目的は<k>①所有権の公証等</k>、<k>②安全性の確保及び公害防止その他環境の保全・整備技術の向上</k>、<k>③整備事業の健全な発達</k>により<k>公共の福祉を増進</k>すること。運転免許は道路交通法の領域で、車両法の目的ではない。"},
  {id:"s2",cat:"sokusoku",art:"第1条",type:"card",
   q:"第1条 この法律が最終的にめざす到達点は？",
   back:"<span class='em'>公共の福祉を増進すること</span>。<br>その手段が①所有権の公証等 ②安全性の確保・環境保全・整備技術の向上 ③整備事業の健全な発達。"},
  {id:"s3",cat:"sokusoku",art:"第2条",type:"mc",
   q:"「道路運送車両」に<b>該当しない</b>ものはどれか。",
   choices:["自動車","原動機付自転車","軽車両","路面電車"],ans:3,
   exp:"「道路運送車両」＝<k>自動車・原動機付自転車・軽車両</k>の3つ（第2条第1項）。<k>軌条（レール）を用いる</k>路面電車は「自動車」の定義から除かれ、該当しない。"},
  {id:"s4",cat:"sokusoku",art:"第2条",type:"card",
   q:"「道路運送車両」とは何を指すか。3種類を挙げよ。",
   back:"<span class='em'>自動車・原動機付自転車・軽車両</span>（第2条第1項）。"},

  {id:"k2",cat:"kensa",art:"第59条",type:"mc",

  {id:"k4",cat:"kensa",art:"第61条",type:"mc",

   exp:"第63条。保安・公害防止上必要な場合に<k>大臣が期間・区域・車種を公示</k>し、該当車の使用者は臨時検査を受けなければならない（リコール的な一斉検査）。"},
  {id:"k8",cat:"kensa",art:"第66条",type:"mc",

  {id:"k10",cat:"kensa",art:"第69条",type:"mc",

  {id:"g3",cat:"seibi",art:"第94条の4",type:"mc",

  // ===== 命令（改善命令・整備命令）=====
  {id:"m1",cat:"meirei",art:"第92条",type:"mc",
   q:"第92条の「改善命令」で、地方運輸局長は誰に対して何を命じることができるか。",
   choices:["自動車特定整備事業者に対し、事業の設備や作業方法等の改善に必要な措置","自動車の使用者に対し、保安基準に適合させる整備","運転者に対し、日常点検の実施","整備管理者に対し、解任"],ans:0,
   exp:"第92条。改善命令の対象は<k>自動車特定整備事業者（整備工場）</k>。設備・作業方法等が不十分・不適切なとき、その改善に必要な措置を命じる。「車」ではなく「事業」に対する命令である点が整備命令との最大の違い。"},
  {id:"m2",cat:"meirei",art:"第54条",type:"mc",
   q:"第54条の「整備命令」で、地方運輸局長は誰に対して何を命じることができるか。",
   choices:["自動車の使用者に対し、保安基準に適合させるために必要な整備","整備事業者に対し、設備の改善","運転者に対し、運転免許の返納","所有者に対し、登録の抹消"],ans:0,
   exp:"第54条。整備命令の対象は<k>自動車の使用者</k>。保安基準に適合しない／適合しなくなるおそれのある自動車について必要な整備を命じ、適合するまでの運行について使用の方法・経路の制限等を指示できる。"},
  {id:"m3",cat:"meirei",art:"第92条・第54条",type:"tf",
   q:"改善命令（第92条）は、自動車の使用者に対して保安基準に適合させる整備を命じるものである。",
   ans:false,
   exp:"誤り。使用者に整備を命じるのは<k>整備命令（第54条）</k>。改善命令（第92条）は<k>自動車特定整備事業者</k>に対し、事業の設備・作業方法の改善を命じるもの。対象を取り違えないこと。"},
  {id:"m4",cat:"meirei",art:"第54条",type:"tf",
   q:"整備命令や指示に従わない場合、地方運輸局長は当該自動車の使用を停止することができる。",
   ans:true,
   exp:"正しい。第54条第2項。命令・指示に従わないとき、地方運輸局長は<k>自動車の使用を停止</k>でき、自動車検査証の返納を命じる。なお『6月以内の期間を定めて』命じられるのは整備事業者に対する<k>事業の停止（第93条）</k>であり、整備命令の使用停止とは別。"},
  {id:"m5",cat:"meirei",art:"第54条",type:"fill",
   q:"穴埋め：地方運輸局長は、自動車が保安基準に適合しない状態等にあるとき、当該自動車の（　　）に対し、必要な整備を行うべきことを命ずることができる。",
   accept:["使用者"],

/* ============================================================
   進捗管理（window.storage があれば永続化、なければメモリ）
   prog[id] = {c:正解数, w:不正解数, streak:連続正解, m:習得済み}
   ============================================================ */
const KEY="dourou_shaho_v1";
let prog={};

async function loadProg(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ prog = JSON.parse(raw)||{}; }
  }catch(e){ prog=prog||{}; }
}
async function saveProg(){
  try{ localStorage.setItem(KEY, JSON.stringify(prog)); }catch(e){}
}
function P(id){ if(!prog[id]) prog[id]={c:0,w:0,streak:0,m:false}; return prog[id]; }
function record(id, ok){
  const p=P(id);
  if(ok){ p.c++; p.streak++; if(p.streak>=2) p.m=true; }
  else { p.w++; p.streak=0; p.m=false; }
  saveProg();
}
function isReview(id){ const p=prog[id]; return p && p.w>0 && !p.m; }
function reviewIds(){ return Q.filter(q=>isReview(q.id)).map(q=>q.id); }

/* ============================================================
   セッション管理
   ============================================================ */
let session=null; // {ids:[], i:0, ok:0, ng:0, modeLabel, wrongIds:[]}

function startSession(ids, modeLabel){
  if(!ids.length) return;
  session={ids:ids.slice(), i:0, ok:0, ng:0, modeLabel, wrongIds:[]};
  show("quiz");
  renderQuestion();
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function orderForStudy(ids){
  // 未習得を先に、習得済みを後に
  const un=ids.filter(id=>!(prog[id]&&prog[id].m));
  const done=ids.filter(id=>prog[id]&&prog[id].m);
  return shuffle(un).concat(shuffle(done));
}

/* ============================================================
   描画
   ============================================================ */
const $=id=>document.getElementById(id);
const SECTIONS=["home","quiz","result"];
function show(name){ SECTIONS.forEach(s=>$(s).classList.toggle("hidden", s!==name)); window.scrollTo(0,0); }

function catStats(key){
  const ids=Q.filter(q=>q.cat===key).map(q=>q.id);
  const m=ids.filter(id=>prog[id]&&prog[id].m).length;
  return {total:ids.length, m, pct: ids.length ? Math.round(m/ids.length*100) : 0};
}
function renderHome(){
  const total=Q.length;
  const mastered=Q.filter(q=>prog[q.id]&&prog[q.id].m).length;
  const seen=Q.filter(q=>prog[q.id]&&(prog[q.id].c+prog[q.id].w)>0).length;
  let tc=0, tw=0; Q.forEach(q=>{const p=prog[q.id]; if(p){tc+=p.c;tw+=p.w;}});
  const acc = (tc+tw)>0 ? Math.round(tc/(tc+tw)*100)+"%" : "–";
  const rv = reviewIds().length;

  $("qtotal").textContent=total;
  $("ovAll").textContent=total; $("ovMastered").textContent=mastered;
  $("ovSeen").textContent=seen;
  const pct=Math.round(mastered/total*100);
  $("ovPct").textContent=pct; $("ovBar").style.width=pct+"%";
  $("ovAcc").textContent=acc;
  $("ovReview").textContent=rv;
  $("reviewN").textContent=rv;
  $("btnReview").disabled = rv===0;

  const list=$("catList"); list.innerHTML="";
  CATS.forEach(c=>{
    const s=catStats(c.key);
    const btn=document.createElement("button");
    btn.className="cat";
    btn.innerHTML=`
      <div class="c-head">
        <div class="sticker">${c.tag}</div>
        <div class="c-name">${c.label}<div class="c-art">${c.art} ・ 全${s.total}問</div></div>
        <div class="c-pct ${s.m===0?'zero':''}">${s.pct}%</div>
      </div>
      <div class="bar"><i style="width:${s.pct}%"></i></div>`;
    btn.onclick=()=>startSession(orderForStudy(Q.filter(q=>q.cat===c.key).map(q=>q.id)), c.label);
    list.appendChild(btn);
  });
}

function typeLabel(t){ return t==="card"?"暗記カード":t==="fill"?"穴埋め":t==="tf"?"○×問題":"四択問題"; }

function renderQuestion(){
  const id=session.ids[session.i];
  const q=Q.find(x=>x.id===id);
  $("qmode").textContent=session.modeLabel;
  $("qidx").textContent=session.i+1;
  $("qlen").textContent=session.ids.length;
  $("qbar").style.width=Math.round(session.i/session.ids.length*100)+"%";

  const body=$("qbody");
  const tag=`<div class="qtag"><span class="type">${typeLabel(q.type)}</span><span class="art">${q.art}</span></div>`;

  if(q.type==="mc"){
    body.innerHTML=`
      <div class="qcard">
        ${tag}
        <div class="qtext">${q.q}</div>
        <div class="choices" id="choices"></div>
        <div id="explSlot"></div>
      </div>`;
    const cont=$("choices");
    const keys=["ア","イ","ウ","エ"];
    q.choices.forEach((ch,idx)=>{
      const b=document.createElement("button");
      b.className="choice";
      b.innerHTML=`<span class="key">${keys[idx]}</span>${ch}`;
      b.onclick=()=>answerMC(q,idx,cont);
      cont.appendChild(b);
    });
  } else if(q.type==="fill"){
    body.innerHTML=`
      <div class="qcard">
        ${tag}
        <div class="qtext">${q.q}</div>
        <input id="fillInput" class="fill-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="答えを入力">
        <div class="fill-actions">
          <button class="reveal-btn" id="fillCheck">答え合わせ</button>
          <button class="fill-skip" id="fillSkip">わからない</button>
        </div>
        <div id="explSlot"></div>
      </div>`;
    $("fillCheck").onclick=()=>answerFill(q,false);
    $("fillSkip").onclick=()=>answerFill(q,true);
    const fi=$("fillInput");
    fi.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); answerFill(q,false); } });
    setTimeout(()=>{ try{fi.focus();}catch(e){} },60);
  } else if(q.type==="tf"){
    body.innerHTML=`
      <div class="qcard">
        ${tag}
        <div class="qtext">${q.q}</div>
        <div class="tf" id="tfChoices">
          <button class="tf-btn" data-v="t" id="tfTrue"><span class="tf-mark">○</span>正しい</button>
          <button class="tf-btn" data-v="f" id="tfFalse"><span class="tf-mark">×</span>誤り</button>
        </div>
        <div id="explSlot"></div>
      </div>`;
    const cont=$("tfChoices");
    $("tfTrue").onclick=()=>answerTF(q,true,cont);
    $("tfFalse").onclick=()=>answerTF(q,false,cont);
  } else {
    body.innerHTML=`
      <div class="qcard">
        ${tag}
        <div class="flip">
          <div class="card-face front"><div class="fc">${q.q}</div></div>
          <div id="backSlot"></div>
        </div>
        <button class="reveal-btn" id="revealBtn">答えを見る</button>
        <div id="selfSlot"></div>
      </div>`;
    $("revealBtn").onclick=()=>revealCard(q);
  }
}

function answerMC(q, idx, cont){
  const ok = idx===q.ans;
  record(q.id, ok);
  session[ok?"ok":"ng"]++;
  if(!ok) session.wrongIds.push(q.id);
  [...cont.children].forEach((b,i)=>{
    b.disabled=true;
    if(i===q.ans) b.classList.add("correct");
    else if(i===idx) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  $("explSlot").innerHTML=`
    <div class="expl ${ok?'ok':'ng'}">
      <div class="verdict">${ok?'正解':'不正解'} ${ok?'✓':'✕'}</div>
      <div class="body">${q.exp}</div>
    </div>
    ${nextButton()}`;
  bindNext();
}

function normalize(s){ return (s||"").trim().toLowerCase().replace(/[\s　、。・「」（）()]/g,""); }
function answerFill(q, skipped){
  const inp=$("fillInput");
  const val=inp?inp.value:"";
  const n=normalize(val);
  const ok = !skipped && n!=="" && q.accept.some(a=>normalize(a)===n);
  record(q.id, ok);
  session[ok?"ok":"ng"]++;
  if(!ok) session.wrongIds.push(q.id);
  if(inp) inp.disabled=true;
  const cb=$("fillCheck"), sb=$("fillSkip");
  if(cb) cb.classList.add("hidden");
  if(sb) sb.classList.add("hidden");
  const verdict = ok ? "正解 ✓" : (skipped ? "答え合わせ" : "不正解 ✕");
  $("explSlot").innerHTML=`
    <div class="expl ${ok?'ok':'ng'}">
      <div class="verdict">${verdict}</div>
      <div class="body"><div style="margin-bottom:6px"><span class="k">正解：</span>${q.accept[0]}</div>${q.exp}</div>
    </div>
    ${nextButton()}`;
  bindNext();
}
function answerTF(q, val, cont){
  const ok = (val===q.ans);
  record(q.id, ok);
  session[ok?"ok":"ng"]++;
  if(!ok) session.wrongIds.push(q.id);
  [...cont.children].forEach(b=>{ b.disabled=true; });
  const correctBtn = q.ans ? $("tfTrue") : $("tfFalse");
  correctBtn.classList.add("correct");
  if(!ok){ (val?$("tfTrue"):$("tfFalse")).classList.add("wrong"); }
  $("explSlot").innerHTML=`
    <div class="expl ${ok?'ok':'ng'}">
      <div class="verdict">${ok?'正解 ✓':'不正解 ✕'}</div>
      <div class="body">${q.exp}</div>
    </div>
    ${nextButton()}`;
  bindNext();
}

function revealCard(q){
  $("backSlot").innerHTML=`<div class="card-face back"><div class="bc">${q.back}</div></div>`;
  $("revealBtn").classList.add("hidden");
  $("selfSlot").innerHTML=`
    <div class="self">
      <button class="again" id="cardAgain">もう一度</button>
      <button class="know" id="cardKnow">覚えていた</button>
    </div>`;
  $("cardKnow").onclick=()=>{ record(q.id,true); session.ok++; nextStep(); };
  $("cardAgain").onclick=()=>{ record(q.id,false); session.ng++; session.wrongIds.push(q.id); nextStep(); };
}

function nextButton(){
  const last = session.i>=session.ids.length-1;
  return `<button class="next-btn" id="nextBtn">${last?'結果を見る':'次の問題へ'} <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>`;
}
function bindNext(){ const b=$("nextBtn"); if(b) b.onclick=nextStep; }
function nextStep(){
  session.i++;
  if(session.i>=session.ids.length){ renderResult(); }
  else { renderQuestion(); }
}

function renderResult(){
  show("result");
  const total=session.ok+session.ng;
  const pct= total>0 ? Math.round(session.ok/total*100) : 0;
  $("resOk").textContent=session.ok;
  $("resNg").textContent=session.ng;
  $("ringPct").textContent=pct+"%";
  const circ=339.29;
  setTimeout(()=>{ $("ringFill").style.strokeDashoffset = circ*(1-pct/100); },50);

  let title, sub;
  if(pct===100){ title="満点！お見事"; sub="この分野はばっちり。別分野や苦手復習へ進もう。"; }
  else if(pct>=80){ title="いい調子"; sub="あと少し。間違えた問題を復習して固めよう。"; }
  else if(pct>=50){ title="半分クリア"; sub="解説を見返して、もう一周すると定着します。"; }
  else { title="ここが伸びしろ"; sub="焦らず解説を読んで、繰り返し出題しよう。"; }
  $("resTitle").textContent=title;
  $("resSub").textContent=sub;

  const uniqWrong=[...new Set(session.wrongIds)];
  const rb=$("resReview");
  rb.style.display = uniqWrong.length ? "" : "none";
  rb.querySelector(".m-t").textContent=`間違えた ${uniqWrong.length} 問をもう一度`;
  rb.onclick=()=>startSession(shuffle(uniqWrong), "まちがい直し");
}

/* ============================================================
   ボタン結線・初期化
   ============================================================ */
function bindHome(){
  $("btnAll").onclick=()=>startSession(shuffle(Q.map(q=>q.id)), "全範囲チャレンジ");
  $("btnReview").onclick=()=>{ const r=reviewIds(); if(r.length) startSession(orderForStudy(r), "苦手復習"); };
  $("btnReset").onclick=async()=>{
    if(confirm("学習の進捗をすべてリセットしますか？")){ prog={}; await saveProg(); renderHome(); }
  };
  $("quizBack").onclick=()=>{ renderHome(); show("home"); };
  $("resHome").onclick=()=>{ renderHome(); show("home"); };
}

(async function init(){
  bindHome();
  await loadProg();
  renderHome();
  show("home");
})();
</script>
